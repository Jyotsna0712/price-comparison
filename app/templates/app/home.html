{% extends "app/base.html" %}

{% block title %}PriceCompare - Home{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold mb-3">E-commerce Price Comparison</h1>
            <p class="text-muted lead">Search a product and compare prices across stores instantly.</p>
        </div>
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form method="get" action="{% url 'results' %}">
                    <div class="input-group input-group-lg">
                        <input type="text" name="q" class="form-control" placeholder="Search for a product (e.g. iPhone 15)"
                               required>
                        <button class="btn btn-primary px-4" type="submit">Search</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
